function genPrice(base) { return Math.round(base * (1 + (Math.random() - 0.5) * 0.15)); }
function genSeats() { return Math.floor(Math.random() * 18) + 2; }
function genViewers() { return Math.floor(Math.random() * 45) + 5; }
function genFlightNum() { return `TMM${Math.floor(Math.random() * 900) + 100}`; }
function genDepTime() {
  const hours = [6,7,8,9,10,11,13,14,15,16,18,20,22];
  const h = hours[Math.floor(Math.random() * hours.length)];
  const m = [0,15,30,45][Math.floor(Math.random() * 4)];
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function calcArrival(dep, dur) {
  const [dH, dM] = dep.split(':').map(Number);
  const match = dur.match(/(\d+)h\s*(\d+)?m?/);
  if (!match) return dep;
  const durH = parseInt(match[1]); const durM = parseInt(match[2] || 0);
  let total = dH * 60 + dM + durH * 60 + durM;
  const arrH = Math.floor(total / 60) % 24; const arrM = total % 60;
  const next = total >= 1440;
  return `${String(arrH).padStart(2,'0')}:${String(arrM).padStart(2,'0')}${next?' +1':''}`;
}
function genFlights(dest) {
  const count = Math.floor(Math.random() * 2) + 2;
  return Array.from({ length: count }, () => {
    const dep = genDepTime();
    return {
      id: Math.random().toString(36).substr(2,9),
      flightNumber: genFlightNum(),
      origin: { city: "Amman", code: "AMM", country: "Jordan" },
      destination: { city: dest.city, code: dest.code, country: dest.country },
      price: genPrice(dest.basePrice),
      duration: dest.duration,
      departure: dep,
      arrival: calcArrival(dep, dest.duration),
      seatsRemaining: genSeats(),
      viewers: genViewers(),
      image: dest.image,
      region: dest.region,
      isBestPrice: Math.random() > 0.7,
    };
  }).sort((a,b) => a.price - b.price);
}

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
function formatDate(d, fmt) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fullMonths = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const pad = n => String(n).padStart(2,'0');
  return fmt
    .replace('dd', pad(d.getDate()))
    .replace('d', d.getDate())
    .replace('MMMM', fullMonths[d.getMonth()])
    .replace('MMM', months[d.getMonth()])
    .replace('yyyy', d.getFullYear())
    .replace('EEE', days[d.getDay()]);
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function isSameDay(a, b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function isBefore(a, b) { return a < b; }
function startOfDay(d) { const r = new Date(d); r.setHours(0,0,0,0); return r; }

// ─── ROUTER (hash-based) ──────────────────────────────────────────────────────
function useRoute() {
  const [route, setRoute] = useState(() => window.location.hash || '#/');
  useEffect(() => {
    const handler = () => setRoute(window.location.hash || '#/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  const navigate = useCallback((path, state) => {
    if (state) window.__navState = state;
    window.location.hash = path;
  }, []);
  const getState = useCallback(() => window.__navState || {}, []);
  return { route, navigate, getState };
}

function SearchBox({ navigate }) {

// ─── SEARCH RESULTS PAGE ──────────────────────────────────────────────────────
function SearchPage({ navigate, route }) {
  const destQuery = decodeURIComponent((route.split('dest=')[1] || '').split('&')[0]);
  const [searchTerm, setSearchTerm] = useState(destQuery);
  const [sortBy, setSortBy] = useState('price');
  const [regionFilter, setRegionFilter] = useState('all');
  const [isLoading, setIsLoading] = useState(true);
  const [flights, setFlights] = useState([]);
  const matchingDests = useMemo(() => {
    let f = destinations;
    if (searchTerm) { const t = searchTerm.toLowerCase(); f = f.filter(d => d.city.toLowerCase().includes(t) || d.code.toLowerCase().includes(t) || d.country.toLowerCase().includes(t)); }
    if (regionFilter !== 'all') f = f.filter(d => d.region === regionFilter);
    return f;
  }, [searchTerm, regionFilter]);
  useEffect(() => {
    setIsLoading(true);
    const t = setTimeout(() => { setFlights(matchingDests.flatMap(d => genFlights(d))); setIsLoading(false); }, 900 + Math.random() * 600);
    return () => clearTimeout(t);
  }, [matchingDests]);
  const sorted = useMemo(() => [...flights].sort((a,b) => sortBy==='price'?a.price-b.price:sortBy==='duration'?a.duration.localeCompare(b.duration):a.departure.localeCompare(b.departure)), [flights, sortBy]);
  const regions = ['all','Europe','Middle East','Asia','Americas'];
  return (
    <div style={{minHeight:'100vh',background:'hsl(225,25%,6%)'}}>
      <Navbar navigate={navigate} route={route} />
      <div style={{paddingTop:'100px',paddingBottom:'64px',maxWidth:'80rem',margin:'0 auto',padding:'100px 1.5rem 64px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'24px'}}>
          <button onClick={()=>navigate('#/')} style={{padding:'8px',borderRadius:'10px',background:'transparent',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} className="glass">
            <Icon name="ArrowLeft" className="w-4 h-4" style={{color:'hsl(215,20%,55%)'}} />
          </button>
          <div>
            <h1 style={{fontSize:'clamp(1.2rem,3vw,1.6rem)',fontWeight:'700',color:'hsl(210,40%,96%)'}}>{searchTerm ? `Flights to ${searchTerm}` : 'All Available Flights'}</h1>
            <p style={{fontSize:'13px',color:'hsl(215,20%,55%)'}}>From Amman (AMM)</p>
          </div>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'12px',marginBottom:'32px'}}>
          <div style={{position:'relative',flex:1,minWidth:'200px'}}>
            <Icon name="Search" className="w-4 h-4" style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'hsl(215,20%,55%)'}} />
            <input value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder="Search destinations..." className="glass"
              style={{width:'100%',paddingLeft:'40px',paddingRight:'16px',paddingTop:'12px',paddingBottom:'12px',borderRadius:'14px',background:'transparent',border:'none',outline:'none',fontSize:'14px',color:'hsl(210,40%,96%)'}} />
          </div>
          <select value={regionFilter} onChange={e=>setRegionFilter(e.target.value)} className="glass"
            style={{padding:'12px 16px',borderRadius:'14px',background:'hsl(225,20%,10%)',border:'none',color:'hsl(210,40%,96%)',fontSize:'13px',cursor:'pointer',outline:'none'}}>
            {regions.map(r => <option key={r} value={r} style={{background:'hsl(225,20%,10%)'}}>{r==='all'?'All Regions':r}</option>)}
          </select>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="glass"
            style={{padding:'12px 16px',borderRadius:'14px',background:'hsl(225,20%,10%)',border:'none',color:'hsl(210,40%,96%)',fontSize:'13px',cursor:'pointer',outline:'none'}}>
            <option value="price" style={{background:'hsl(225,20%,10%)'}}>Lowest Price</option>
            <option value="duration" style={{background:'hsl(225,20%,10%)'}}>Shortest</option>
            <option value="departure" style={{background:'hsl(225,20%,10%)'}}>Earliest</option>
          </select>
        </div>
        {isLoading ? (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'96px 0'}}>
            <Icon name="Plane" className="w-8 h-8 animate-spin" style={{color:'hsl(38,92%,55%)'}} />
            <p style={{fontSize:'13px',color:'hsl(215,20%,55%)',marginTop:'16px'}}>Searching flights...</p>
          </div>
        ) : sorted.length === 0 ? (
          <div style={{textAlign:'center',padding:'96px 0'}}>
            <p style={{color:'hsl(210,40%,96%)',fontWeight:'600',marginBottom:'8px'}}>No flights found</p>
            <p style={{fontSize:'13px',color:'hsl(215,20%,55%)',marginBottom:'16px'}}>Try a different destination or region</p>
            <button onClick={()=>{setSearchTerm('');setRegionFilter('all');}} className="glass"
              style={{padding:'10px 20px',borderRadius:'12px',background:'transparent',border:'none',color:'hsl(210,40%,96%)',cursor:'pointer',fontSize:'13px'}}>Clear Filters</button>
          </div>
        ) : (
          <>
            <p style={{fontSize:'12px',color:'hsl(215,20%,55%)',marginBottom:'16px'}}>{sorted.length} flight{sorted.length!==1?'s':''} found</p>
            {sorted.map(f => <FlightCard key={f.id} flight={f} onSelect={fl=>navigate('#/booking',{flight:fl})} />)}
          </>
        )}
      </div>
      <Footer />
    </div>
  );
}

  const [start, setStart] = useState(startOfDay(new Date()));
  const today = startOfDay(new Date());
  const days = Array.from({length:14},(_,i)=>addDays(start,i));
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
        <button onClick={()=>{const nd=addDays(start,-7);setStart(isBefore(nd,today)?today:nd);}} className="glass"
          style={{padding:'8px',borderRadius:'10px',background:'transparent',border:'none',cursor:'pointer'}}>
          <Icon name="ChevronLeft" className="w-4 h-4" style={{color:'hsl(215,20%,55%)'}} />
        </button>
        <span style={{fontSize:'13px',color:'hsl(215,20%,55%)'}}>{formatDate(days[0],'MMM yyyy')}</span>
        <button onClick={()=>setStart(addDays(start,7))} className="glass"
          style={{padding:'8px',borderRadius:'10px',background:'transparent',border:'none',cursor:'pointer'}}>
          <Icon name="ChevronRight" className="w-4 h-4" style={{color:'hsl(215,20%,55%)'}} />
        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'8px'}}>
        {days.map((d,i) => {
          const past = isBefore(d, today);
          const sel = selectedDate && isSameDay(d, selectedDate);
          const pv = Math.floor(Math.random()*3);
          return (
            <button key={i} disabled={past} onClick={()=>onSelect(d)}
              style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 6px',borderRadius:'14px',border:'none',cursor:past?'default':'pointer',opacity:past?0.3:1,
                background:sel?'hsl(38,92%,55%)':'transparent',transition:'all 0.2s'}}
              className={sel?'glow-primary':past?'':'glass'}
              onMouseEnter={e=>{if(!past&&!sel)e.currentTarget.style.borderColor='rgba(238,168,57,0.3)';}}
              onMouseLeave={e=>{if(!past&&!sel)e.currentTarget.style.borderColor='';}}
            >
              <span style={{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.05em',color:sel?'rgba(0,0,0,0.7)':'hsl(215,20%,55%)'}}>{formatDate(d,'EEE')}</span>
              <span style={{fontSize:'18px',fontWeight:'700',color:sel?'hsl(225,25%,6%)':'hsl(210,40%,96%)',margin:'4px 0'}}>{formatDate(d,'d')}</span>
              {!past&&<span style={{fontSize:'10px',color:sel?'rgba(0,0,0,0.6)':pv===0?'hsl(142,76%,55%)':pv===1?'hsl(215,20%,55%)':'hsl(38,92%,55%)'}}>{pv===0?'Low':pv===1?'Med':'High'}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── SEAT MAP ─────────────────────────────────────────────────────────────────
function SeatMap({ selectedSeat, onSelect }) {
  const ROWS = 12;
  const COLS = ['A','B','C','','D','E','F'];
  const occupied = useMemo(() => {
    const s = new Set();
    for (let r=1;r<=ROWS;r++) for (const c of ['A','B','C','D','E','F']) if (Math.random()>0.6) s.add(`${r}${c}`);
    return s;
  }, []);
  return (
    <div style={{maxWidth:'320px',margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'center',marginBottom:'16px'}}>
        <div style={{width:'120px',height:'64px',background:'linear-gradient(to bottom,rgba(255,255,255,0.08),rgba(255,255,255,0.03))',borderRadius:'60px 60px 0 0',border:'1px solid rgba(255,255,255,0.08)',display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:'8px'}}>
          <span style={{fontSize:'10px',color:'hsl(215,20%,55%)',textTransform:'uppercase',letterSpacing:'0.15em'}}>Front</span>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'6px',marginBottom:'8px',padding:'0 8px'}}>
        {COLS.map((c,i)=><div key={i} style={{textAlign:'center',fontSize:'11px',fontFamily:'monospace',color:'hsl(215,20%,55%)'}}>{c}</div>)}
      </div>
      <div style={{padding:'0 8px'}}>
        {Array.from({length:ROWS},(_,row)=>{
          const rn=row+1;
          return (
            <div key={rn} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'6px',marginBottom:'6px'}}>
              {COLS.map((c,ci)=>{
                if(!c) return <div key={ci} style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontFamily:'monospace',color:'hsl(215,20%,55%)'}}>{rn}</div>;
                const sid=`${rn}${c}`;
                const occ=occupied.has(sid);
                const sel=selectedSeat===sid;
                return (
                  <button key={sid} disabled={occ} onClick={()=>onSelect(sid)}
                    style={{aspectRatio:'1',borderRadius:'6px',border:sel?'none':'1px solid rgba(255,255,255,0.08)',
                      background:sel?'hsl(38,92%,55%)':occ?'rgba(255,255,255,0.04)':'rgba(255,255,255,0.06)',
                      color:sel?'hsl(225,25%,6%)':occ?'rgba(255,255,255,0.15)':'hsl(215,20%,55%)',
                      cursor:occ?'not-allowed':'pointer',fontSize:'10px',fontWeight:'600',fontFamily:'monospace',
                      transition:'all 0.15s',boxShadow:sel?'0 0 20px -5px rgba(238,168,57,0.4)':'none'}}
                    onMouseEnter={e=>{if(!occ&&!sel){e.currentTarget.style.background='rgba(200,160,50,0.15)';e.currentTarget.style.transform='scale(1.15)';}}}
                    onMouseLeave={e=>{if(!occ&&!sel){e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.transform='scale(1)';}}}
                  >{occ?'×':c}</button>
                );
              })}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:'24px',marginTop:'20px'}}>
        {[['rgba(255,255,255,0.06)','Available'],['hsl(38,92%,55%)','Selected'],['rgba(255,255,255,0.04)','Occupied']].map(([bg,label])=>(
          <div key={label} style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <div style={{width:'14px',height:'14px',borderRadius:'4px',background:bg,border:'1px solid rgba(255,255,255,0.08)'}} />
            <span style={{fontSize:'11px',color:'hsl(215,20%,55%)'}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

          </button>
          <button onClick={()=>navigate('#/search')} style={{padding:'12px 24px',borderRadius:'14px',background:'hsl(38,92%,55%)',border:'none',color:'hsl(225,25%,6%)',cursor:'pointer',fontWeight:'700',fontSize:'14px',display:'flex',alignItems:'center',gap:'8px'}}>
            <Icon name="Plane" className="w-4 h-4" style={{color:'hsl(225,25%,6%)'}} /> Book Another Flight
          </button>
        </div>
      </div>
      <Footer />
    </div>
  );
}

// ─── HOME PAGE ────────────────────────────────────────────────────────────────
function HomePage({ navigate, route }) {
  return (
    <div style={{minHeight:'100vh',background:'hsl(225,25%,6%)'}}>
      <Navbar navigate={navigate} route={route} />
      <HeroSection />
      <SearchBox navigate={navigate} />
      <RecommendedFlights navigate={navigate} />
      <PartnerNetwork />
      <Footer />
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const { route, navigate, getState } = useRoute();
  const path = route.split('?')[0];
  const state = getState();
  if (path === '#/search' || path === '#/search/') return <SearchPage navigate={navigate} route={route} />;
  if (path === '#/booking') return <BookingPage navigate={navigate} state={state} />;
  if (path === '#/boarding-pass') return <BoardingPassPage navigate={navigate} state={state} />;
  return <HomePage navigate={navigate} route={route} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
