<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b1220;
  --card:#111827;
  --primary:#2563eb;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
}

header img {height:45px;}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:var(--muted);
}

/* HERO */
.hero {
  padding:80px 20px;
  text-align:center;
}

.hero h1 {
  font-size:3rem;
  margin-bottom:10px;
}

.hero p {
  color:var(--muted);
}

/* SEARCH */
.search-box {
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(4,1fr) auto;
  gap:10px;
  max-width:900px;
}

.search-box input {
  padding:12px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:white;
}

.search-box button {
  background:var(--primary);
  border:none;
  color:white;
  border-radius:12px;
  padding:12px;
  cursor:pointer;
}

/* LOADER */
.loader {
  text-align:center;
  display:none;
}

/* FLIGHTS */
.flights {
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

.flight-card {
  background:var(--card);
  padding:20px;
  border-radius:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  transition:0.2s;
}

.flight-card:hover {
  transform:translateY(-4px);
}

.flight-info h3 {margin:0;}
.flight-info p {color:var(--muted);}

.badge {
  background:#ef444420;
  color:#ef4444;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}

.flight-card button {
  background:var(--accent);
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:var(--card);
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:400px;
}

/* MOBILE */
@media(max-width:700px){
  .search-box {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <img src="Logo.png">
  <nav>
    <a href="#">Home</a>
    <a href="#flights">Flights</a>
  </nav>
</header>

<section class="hero">
  <h1>Search global flights</h1>
  <p>Powered by TRIPLE M × Jordanian Airlines</p>

  <div class="search-box">
    <input id="from" placeholder="From (e.g. Amman)">
    <input id="to" placeholder="To (e.g. London)">
    <input type="date" id="date">
    <input placeholder="Passengers">
    <button onclick="searchFlights()">Search</button>
  </div>
</section>

<div class="loader" id="loader">Searching best routes...</div>

<section class="flights" id="flights">
  <div id="results"></div>
</section>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Booking Demo</h2>
    <p>This is a simulation only.</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const routes = [
  {from:'Amman',to:'Dubai',base:220},
  {from:'Amman',to:'London',base:480},
  {from:'Amman',to:'Paris',base:420},
  {from:'Amman',to:'New York',base:850},
  {from:'Amman',to:'Istanbul',base:180},
  {from:'Amman',to:'Cairo',base:150},
  {from:'Dubai',to:'Amman',base:220},
  {from:'London',to:'Amman',base:480},
  {from:'Paris',to:'Amman',base:420},
  {from:'New York',to:'Amman',base:850},
  {from:'Istanbul',to:'Amman',base:180},
  {from:'Cairo',to:'Amman',base:150}
];

function searchFlights(){
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');

  const from = document.getElementById('from').value.toLowerCase();
  const to = document.getElementById('to').value.toLowerCase();

  loader.style.display = 'block';
  results.innerHTML = '';

  setTimeout(()=>{

    loader.style.display = 'none';

    let filtered = routes.filter(r =>
      (from==='' || r.from.toLowerCase().includes(from)) &&
      (to==='' || r.to.toLowerCase().includes(to))
    );

    if(filtered.length===0){
      results.innerHTML = '<p>No routes found</p>';
      return;
    }

    filtered.forEach(r=>{
      const seats = Math.floor(Math.random()*5)+1;
      const dynamicPrice = r.base + Math.floor(Math.random()*50);

      const card = document.createElement('div');
      card.className='flight-card';

      card.innerHTML = `
        <div class="flight-info">
          <h3>${r.from} → ${r.to}</h3>
          <p>$${dynamicPrice} round trip</p>
          <span class="badge">${seats} seats left</span>
        </div>
        <button onclick="openModal()">Select</button>
      `;

      results.appendChild(card);
    });

  },1000);
}

function openModal(){
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
