<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
:root{
  --bg:#0b1220;
  --card:#121a2b;
  --primary:#3b82f6;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#0b1220,#020617);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}
header img{height:45px}
nav a{
  margin-left:25px;
  text-decoration:none;
  color:var(--muted);
  font-weight:500;
}
nav a:hover{color:white}

.hero{
  padding:100px 20px 60px;
  text-align:center;
}
.hero h1{
  font-size:3.2rem;
  margin-bottom:10px;
}
.hero p{
  color:var(--muted);
}

.search-box{
  margin:40px auto 0;
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:12px;
  max-width:900px;
  background:var(--card);
  padding:12px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.search-box input{
  padding:14px;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

.search-box button{
  background:var(--primary);
  border:none;
  color:white;
  border-radius:10px;
  padding:14px 20px;
  font-weight:600;
  cursor:pointer;
}

.search-box button:hover{opacity:0.9}

.partners{
  text-align:center;
  margin-top:30px;
}
.partners h3{
  color:var(--muted);
  margin-bottom:10px;
}
.partner-list{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}
.partner{
  background:var(--card);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  color:var(--muted);
}

.flights{
  max-width:1000px;
  margin:50px auto;
  padding:0 20px;
}

.flight-card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  transition:0.2s;
  border:1px solid rgba(255,255,255,0.04);
}
.flight-card:hover{
  transform:translateY(-3px);
  border-color:rgba(255,255,255,0.1);
}

.flight-left h3{
  margin:0;
  font-size:1.1rem;
}
.flight-left p{
  margin:5px 0;
  color:var(--muted);
}

.price{
  font-size:1.3rem;
  font-weight:600;
}

.meta{
  font-size:12px;
  color:#f87171;
}

.flight-card button{
  background:var(--accent);
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:var(--card);
  padding:30px;
  border-radius:16px;
  width:90%;
  max-width:400px;
  text-align:center;
}

footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

@media(max-width:700px){
  .search-box{grid-template-columns:1fr}
}
</style></head><body><header>
  <img src="Logo.png" alt="Logo">
  <nav>
    <a href="#">Home</a>
    <a href="#flights">Flights</a>
  </nav>
</header><section class="hero">
  <h1>Find better flights from Amman</h1>
  <p>Low fares. Trusted routes. Clean experience.</p>  <div class="search-box">
    <input value="Amman" disabled>
    <input id="to" placeholder="Where to?">
    <input type="date">
    <button onclick="searchFlights()">Search</button>
  </div>
</section><div class="partners">
  <h3>Partner Destinations</h3>
  <div class="partner-list">
    <div class="partner">UAE</div>
    <div class="partner">UK</div>
    <div class="partner">France</div>
    <div class="partner">Germany</div>
    <div class="partner">USA</div>
    <div class="partner">Turkey</div>
    <div class="partner">Italy</div>
    <div class="partner">Egypt</div>
  </div>
</div><section class="flights" id="flights">
  <div id="results"></div>
</section><div class="modal" id="modal">
  <div class="modal-content">
    <h2>Booking unavailable</h2>
    <p>This is a demo interface only.</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div><footer>
  © 2026 TRIPLE M FOR FLYING
</footer><script>
const routes=[
{to:'Dubai',price:180},
{to:'London',price:420},
{to:'Paris',price:380},
{to:'Berlin',price:320},
{to:'New York',price:750},
{to:'Istanbul',price:160},
{to:'Rome',price:300},
{to:'Cairo',price:140}
];

function searchFlights(){
  const results=document.getElementById('results');
  results.innerHTML='';

  const to=document.getElementById('to').value.toLowerCase();

  const filtered=routes.filter(r=>
    (to===''||r.to.toLowerCase().includes(to))
  );

  if(filtered.length===0){
    results.innerHTML='<p style="text-align:center;color:var(--muted)">No routes found</p>';
    return;
  }

  filtered.forEach(r=>{
    const seats=Math.floor(Math.random()*5)+1;
    const price=r.price+Math.floor(Math.random()*40);

    const card=document.createElement('div');
    card.className='flight-card';

    card.innerHTML=`
      <div class="flight-left">
        <h3>Amman → ${r.to}</h3>
        <p>Round trip • Direct</p>
        <div class="meta">${seats} seats left</div>
      </div>
      <div style="text-align:right">
        <div class="price">$${price}</div>
        <button onclick="openModal()">Select</button>
      </div>
    `;

    results.appendChild(card);
  });
}

function openModal(){
  document.getElementById('modal').style.display='flex';
}
function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script></body>
</html>
