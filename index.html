<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b1220;
  --card:#111827;
  --primary:#2563eb;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}

.search-box {
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(4,1fr) auto;
  gap:10px;
  max-width:900px;
}

.search-box input, .search-box button {
  padding:12px;
  border-radius:10px;
  border:none;
}

.search-box input {
  background:var(--card);
  color:white;
}

.search-box button {
  background:var(--primary);
  color:white;
  cursor:pointer;
}

/* FLIGHTS */
.flights {
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

.flight-card {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

/* MODALS */
.modal {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:var(--card);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:500px;
}

/* SEATS */
.seat-map {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-top:15px;
}

.seat {
  background:#1f2937;
  padding:10px;
  text-align:center;
  border-radius:6px;
  cursor:pointer;
}

.seat.selected {
  background:var(--accent);
}

button {
  cursor:pointer;
}

/* MOBILE */
@media(max-width:700px){
  .search-box {grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <h2>TRIPLE M ✈️</h2>
</header>

<section class="hero">
  <h1>Book smarter flights</h1>
  <p>TRIPLE M × Jordanian Airlines</p>

  <div class="search-box">
    <input id="from" placeholder="From">
    <input id="to" placeholder="To">
    <input type="date">
    <input placeholder="Passengers">
    <button onclick="searchFlights()">Search</button>
  </div>
</section>

<section class="flights">
  <div id="results"></div>
</section>

<!-- STEP 1: FLIGHT DETAILS -->
<div class="modal" id="detailsModal">
  <div class="modal-content">
    <h2 id="flightTitle"></h2>
    <p id="flightPrice"></p>
    <button onclick="openSeats()">Continue</button>
  </div>
</div>

<!-- STEP 2: SEAT SELECTION -->
<div class="modal" id="seatModal">
  <div class="modal-content">
    <h2>Select your seat</h2>
    <div class="seat-map" id="seatMap"></div>
    <button onclick="openPayment()">Continue</button>
  </div>
</div>

<!-- STEP 3: PAYMENT -->
<div class="modal" id="paymentModal">
  <div class="modal-content">
    <h2>Payment</h2>
    <p>This is a demo checkout.</p>
    <button onclick="finishBooking()">Confirm</button>
  </div>
</div>

<script>
const routes = [
  {from:'Amman',to:'London',price:480},
  {from:'Amman',to:'Dubai',price:220},
  {from:'Paris',to:'Amman',price:420},
  {from:'New York',to:'Amman',price:850}
];

let selectedFlight = null;

function searchFlights(){
  const results = document.getElementById('results');
  results.innerHTML = '';

  const from = document.getElementById('from').value.toLowerCase();
  const to = document.getElementById('to').value.toLowerCase();

  const filtered = routes.filter(r =>
    (from==='' || r.from.toLowerCase().includes(from)) &&
    (to==='' || r.to.toLowerCase().includes(to))
  );

  filtered.forEach(r=>{
    const price = r.price + Math.floor(Math.random()*80);

    const card = document.createElement('div');
    card.className='flight-card';

    card.innerHTML = `
      <div>
        <h3>${r.from} → ${r.to}</h3>
        <p>$${price}</p>
      </div>
      <button onclick="selectFlight('${r.from}','${r.to}',${price})">Select</button>
    `;

    results.appendChild(card);
  });
}

function selectFlight(from,to,price){
  selectedFlight = {from,to,price};

  document.getElementById('flightTitle').innerText = `${from} → ${to}`;
  document.getElementById('flightPrice').innerText = `$${price}`;

  openModal('detailsModal');
}

function openSeats(){
  closeAll();
  generateSeats();
  openModal('seatModal');
}

function generateSeats(){
  const map = document.getElementById('seatMap');
  map.innerHTML = '';

  for(let i=0;i<30;i++){
    const seat = document.createElement('div');
    seat.className='seat';
    seat.innerText = i+1;

    seat.onclick = ()=>{
      seat.classList.toggle('selected');
    };

    map.appendChild(seat);
  }
}

function openPayment(){
  closeAll();
  openModal('paymentModal');
}

function finishBooking(){
  alert('Booking complete (demo)');
  closeAll();
}

function openModal(id){
  document.getElementById(id).style.display='flex';
}

function closeAll(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
}
</script>

</body>
</html>
