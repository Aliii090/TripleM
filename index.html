<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
:root{
  --bg:#070b18;
  --panel:#0f172a;
  --card:#111c33;
  --primary:#3b82f6;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --danger:#f87171;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 10% 10%,#1d4ed8 0%,transparent 40%),
             radial-gradient(circle at 90% 20%,#0ea5e9 0%,transparent 40%),
             var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.2);
  position:sticky;
  top:0;
  z-index:10;
}

header img{height:48px}

nav a{
  margin-left:22px;
  color:var(--muted);
  text-decoration:none;
  font-weight:500;
}
nav a:hover{color:white}

.hero{
  padding:90px 20px 40px;
  text-align:center;
}

.hero h1{
  font-size:3.4rem;
  margin-bottom:10px;
}

.hero p{color:var(--muted)}

.search{
  margin:35px auto;
  max-width:950px;
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:10px;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(18px);
}

.search input{
  padding:14px;
  border:none;
  border-radius:12px;
  background:#0b1220;
  color:white;
}

.search button{
  background:linear-gradient(135deg,var(--primary),#2563eb);
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.live{
  text-align:center;
  color:var(--muted);
  margin-top:10px;
  font-size:13px;
}

.partners{
  text-align:center;
  margin-top:40px;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.chip{
  padding:8px 14px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  font-size:13px;
  color:var(--muted);
}

.container{
  max-width:1050px;
  margin:50px auto;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.06);
  padding:18px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,255,255,0.15);
}

.price{
  font-size:1.4rem;
  font-weight:700;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.badge{
  font-size:12px;
  color:var(--danger);
}

.btn{
  background:var(--accent);
  border:none;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
}

.box{
  width:92%;
  max-width:420px;
  background:var(--panel);
  padding:24px;
  border-radius:18px;
  text-align:center;
}

.seats{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
  margin-top:15px;
}

.seat{
  background:#1f2a44;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.seat.sel{background:var(--accent)}

.ticket{
  text-align:left;
  background:#0b1220;
  padding:16px;
  border-radius:12px;
  margin-top:15px;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

</style></head><body><header>
  <img src="Logo.png">
  <nav>
    <a href="#">Home</a>
    <a href="#flights">Flights</a>
  </nav>
</header><section class="hero">
  <h1>Investor-grade flight platform</h1>
  <p>TRIPLE M × Jordanian Airlines — demo system</p>  <div class="search">
    <input value="Amman" disabled>
    <input id="to" placeholder="Destination (London, Dubai, New York...)">
    <input type="date">
    <button onclick="search()">Search</button>
  </div>  <div class="live" id="live">🔥 24 people viewing flights right now</div>
</section><div class="partners">
  <div class="chips">
    <div class="chip">UAE</div>
    <div class="chip">UK</div>
    <div class="chip">USA</div>
    <div class="chip">France</div>
    <div class="chip">Germany</div>
    <div class="chip">Turkey</div>
    <div class="chip">Italy</div>
    <div class="chip">Egypt</div>
  </div>
</div><div class="container" id="results"></div><!-- MODALS --><div class="modal" id="m1">
  <div class="box">
    <h3 id="t"></h3>
    <p id="p"></p>
    <button class="btn" onclick="seat()">Choose Seat</button>
  </div>
</div><div class="modal" id="m2">
  <div class="box">
    <h3>Select Seat</h3>
    <div class="seats" id="seats"></div>
    <button class="btn" onclick="ticket()">Confirm</button>
  </div>
</div><div class="modal" id="m3">
  <div class="box">
    <h3>Boarding Pass</h3>
    <div class="ticket" id="ticket"></div>
    <button class="btn" onclick="closeAll()">Done</button>
  </div>
</div><script>
const data=[
{to:"Dubai",price:180},{to:"London",price:420},{to:"Paris",price:380},
{to:"Berlin",price:320},{to:"New York",price:750},{to:"Istanbul",price:160},
{to:"Rome",price:300},{to:"Cairo",price:140},{to:"Tokyo",price:900}
];

let current=null;
let seat="";

function search(){
  const r=document.getElementById("results");
  const to=document.getElementById("to").value.toLowerCase();

  r.innerHTML="";

  const filtered=data.filter(x=>!to||x.to.toLowerCase().includes(to));

  if(filtered.length===0){
    r.innerHTML=`<div style="text-align:center;color:#94a3b8">No flights found</div>`;
    return;
  }

  filtered.forEach(x=>{
    const price=x.price+Math.floor(Math.random()*60);
    const seats=Math.floor(Math.random()*5)+1;

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <div>
        <b>Amman → ${x.to}</b>
        <div class="small">Direct • Jordanian Airlines Partner</div>
        <div class="badge">${seats} seats left</div>
      </div>
      <div style="text-align:right">
        <div class="price">$${price}</div>
        <button class="btn" onclick='open1("${x.to}",${price})'>Book</button>
      </div>
    `;

    r.appendChild(d);
  });
}

function open1(to,price){
  current={to,price};
  document.getElementById("t").innerText=`Amman → ${to}`;
  document.getElementById("p").innerText=`Estimated fare $${price}`;
  document.getElementById("m1").style.display="flex";
}

function seat(){
  document.getElementById("m1").style.display="none";
  const s=document.getElementById("seats");
  s.innerHTML="";

  for(let i=1;i<=24;i++){
    const d=document.createElement("div");
    d.className="seat";
    d.innerText=i;
    d.onclick=()=>{
      document.querySelectorAll(".seat").forEach(x=>x.classList.remove("sel"));
      d.classList.add("sel");
      seat=i;
    };
    s.appendChild(d);
  }

  document.getElementById("m2").style.display="flex";
}

function ticket(){
  document.getElementById("m2").style.display="none";
  document.getElementById("m3").style.display="flex";

  document.getElementById("ticket").innerHTML=`
    <b>TRIPLE M FOR FLYING</b><br><br>
    Route: Amman → ${current.to}<br>
    Seat: ${seat}<br>
    Price: $${current.price}<br>
    Status: CONFIRMED (DEMO)
  `;
}

function closeAll(){
  document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

search();

setInterval(()=>{
  document.getElementById("live").innerText=
  `🔥 ${15+Math.floor(Math.random()*25)} people viewing flights right now`;
},4000);
</script></body>
</html>
