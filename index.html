<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
:root {
  --bg:#020617;
  --glass:rgba(255,255,255,0.06);
  --primary:#3b82f6;
  --accent:#22c55e;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 20% 20%,#1e3a8a,transparent),#020617;
  color:var(--text);
  overflow-x:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}
header img{
  height:50px;
}
nav a{
  margin-left:25px;
  text-decoration:none;
  color:var(--muted);
  transition:0.2s;
}
nav a:hover{color:white}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.hero h1{
  font-size:3.5rem;
  margin-bottom:10px;
  animation:fadeUp 1s ease;
}
.hero p{
  color:var(--muted);
  animation:fadeUp 1.2s ease;
}

/* GLASS SEARCH */
.search-box{
  margin-top:40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  padding:15px;
  border-radius:20px;
  display:grid;
  grid-template-columns:repeat(4,1fr) auto;
  gap:10px;
  width:90%;
  max-width:900px;
  animation:fadeUp 1.4s ease;
}

.search-box input{
  padding:14px;
  border-radius:12px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

.search-box button{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  border:none;
  color:white;
  border-radius:12px;
  padding:14px;
  cursor:pointer;
  transition:0.2s;
}
.search-box button:hover{
  transform:scale(1.05);
}

/* FLIGHTS */
.flights{
  max-width:1100px;
  margin:60px auto;
  padding:20px;
}

.flight-card{
  backdrop-filter:blur(20px);
  background:var(--glass);
  padding:20px;
  border-radius:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  transition:0.3s;
  animation:fadeUp 0.6s ease;
}
.flight-card:hover{
  transform:translateY(-6px) scale(1.01);
}

.flight-info h3{margin:0}
.flight-info p{color:var(--muted)}

.price{
  font-size:1.4rem;
  font-weight:600;
}

.badge{
  color:#f87171;
  font-size:12px;
}

.flight-card button{
  background:var(--accent);
  border:none;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content{
  backdrop-filter:blur(20px);
  background:var(--glass);
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:400px;
}

/* SEATS */
.seat-map{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-top:15px;
}
.seat{
  background:#1f2937;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}
.seat:hover{transform:scale(1.1)}
.seat.selected{background:var(--accent)}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* MOBILE */
@media(max-width:700px){
  .search-box{grid-template-columns:1fr}
}
</style></head><body><header>
  <img src="Logo.png" alt="Logo">
  <nav>
    <a href="#">Home</a>
    <a href="#flights">Flights</a>
  </nav>
</header><section class="hero">
  <h1>Fly anywhere, effortlessly</h1>
  <p>TRIPLE M × Jordanian Airlines</p>  <div class="search-box">
    <input id="from" placeholder="From">
    <input id="to" placeholder="To">
    <input type="date">
    <input placeholder="Passengers">
    <button onclick="searchFlights()">Search</button>
  </div>
</section><section class="flights" id="flights">
  <div id="results"></div>
</section><div class="modal" id="modal">
  <div class="modal-content">
    <h2>Booking Demo</h2>
    <p>This is a simulation only</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div><script>
const routes=[
{from:'Amman',to:'London',price:480},
{from:'Amman',to:'Dubai',price:220},
{from:'Amman',to:'Paris',price:420},
{from:'Dubai',to:'Amman',price:220},
{from:'London',to:'Amman',price:480}
];

function searchFlights(){
  const results=document.getElementById('results');
  results.innerHTML='';

  const from=document.getElementById('from').value.toLowerCase();
  const to=document.getElementById('to').value.toLowerCase();

  const filtered=routes.filter(r=>
    (from===''||r.from.toLowerCase().includes(from)) &&
    (to===''||r.to.toLowerCase().includes(to))
  );

  filtered.forEach(r=>{
    const seats=Math.floor(Math.random()*5)+1;
    const price=r.price+Math.floor(Math.random()*50);

    const card=document.createElement('div');
    card.className='flight-card';

    card.innerHTML=`
      <div class="flight-info">
        <h3>${r.from} → ${r.to}</h3>
        <p class="price">$${price}</p>
        <span class="badge">${seats} seats left</span>
      </div>
      <button onclick="openModal()">Select</button>
    `;

    results.appendChild(card);
  });
}

function openModal(){
  document.getElementById('modal').style.display='flex';
}
function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script></body>
</html>
