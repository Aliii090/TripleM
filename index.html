<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
:root {
  --bg:#020617;
  --glass:rgba(255,255,255,0.06);
  --primary:#3b82f6;
  --accent:#22c55e;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 20% 20%,#1e3a8a,transparent),#020617;
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}
header img{height:50px}
nav a{margin-left:25px;text-decoration:none;color:var(--muted)}

.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{font-size:3.5rem}
.hero p{color:var(--muted)}

.search-box{
  margin-top:40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  padding:15px;
  border-radius:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr) auto;
  gap:10px;
  width:90%;
  max-width:800px;
}

.search-box input{
  padding:14px;
  border-radius:12px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

.search-box button{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  border:none;
  color:white;
  border-radius:12px;
  padding:14px;
  cursor:pointer;
}

.flights{
  max-width:1100px;
  margin:60px auto;
  padding:20px;
}

.flight-card{
  backdrop-filter:blur(20px);
  background:var(--glass);
  padding:20px;
  border-radius:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  transition:0.3s;
}
.flight-card:hover{transform:translateY(-6px)}

.price{font-size:1.3rem;font-weight:600}
.badge{color:#f87171;font-size:12px}

.flight-card button{
  background:var(--accent);
  border:none;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
}

.partners{
  text-align:center;
  margin-top:-60px;
}
.partners h3{color:var(--muted)}
.partner-list{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin-top:10px;
}
.partner{
  background:var(--glass);
  padding:10px 15px;
  border-radius:12px;
  font-size:14px;
}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content{
  backdrop-filter:blur(20px);
  background:var(--glass);
  padding:30px;
  border-radius:20px;
  text-align:center;
}

@media(max-width:700px){
  .search-box{grid-template-columns:1fr}
}
</style></head><body><header>
  <img src="Logo.png">
  <nav>
    <a href="#">Home</a>
    <a href="#flights">Flights</a>
  </nav>
</header><section class="hero">
  <h1>Fly from Amman worldwide</h1>
  <p>TRIPLE M × Jordanian Airlines</p>  <div class="search-box">
    <input value="Amman" disabled>
    <input id="to" placeholder="Destination">
    <input type="date">
    <button onclick="searchFlights()">Search</button>
  </div>
</section><div class="partners">
  <h3>Partner Destinations</h3>
  <div class="partner-list">
    <div class="partner">UAE</div>
    <div class="partner">UK</div>
    <div class="partner">France</div>
    <div class="partner">Germany</div>
    <div class="partner">USA</div>
    <div class="partner">Turkey</div>
    <div class="partner">Italy</div>
    <div class="partner">Egypt</div>
  </div>
</div><section class="flights" id="flights">
  <div id="results"></div>
</section><div class="modal" id="modal">
  <div class="modal-content">
    <h2>Booking Demo</h2>
    <p>This is a simulation only</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div><script>
const routes=[
{to:'Dubai',price:180},
{to:'London',price:420},
{to:'Paris',price:380},
{to:'Berlin',price:320},
{to:'New York',price:750},
{to:'Istanbul',price:160},
{to:'Rome',price:300},
{to:'Cairo',price:140}
];

function searchFlights(){
  const results=document.getElementById('results');
  results.innerHTML='';

  const to=document.getElementById('to').value.toLowerCase();

  const filtered=routes.filter(r=>
    (to===''||r.to.toLowerCase().includes(to))
  );

  filtered.forEach(r=>{
    const seats=Math.floor(Math.random()*5)+1;
    const price=r.price+Math.floor(Math.random()*40);

    const card=document.createElement('div');
    card.className='flight-card';

    card.innerHTML=`
      <div>
        <h3>Amman → ${r.to}</h3>
        <p class="price">$${price} round trip</p>
        <span class="badge">${seats} seats left</span>
      </div>
      <button onclick="openModal()">Select</button>
    `;

    results.appendChild(card);
  });
}

function openModal(){
  document.getElementById('modal').style.display='flex';
}
function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script></body>
</html>
