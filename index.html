<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f172a;
  --card:#111827;
  --primary:#3b82f6;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}

header img {height:45px;}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:var(--muted);
}

/* HERO */
.hero {
  height:85vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#1e3a8a,#020617);
}

.hero h1 {
  font-size:3.5rem;
}

.hero p {
  color:var(--muted);
}

/* SEARCH */
.search-box {
  margin-top:30px;
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:20px;
  display:grid;
  grid-template-columns:repeat(4,1fr) auto;
  gap:10px;
  width:90%;
  max-width:900px;
}

.search-box input {
  padding:12px;
  border:none;
  border-radius:12px;
  background:#020617;
  color:white;
}

.search-box button {
  background:var(--primary);
  border:none;
  color:white;
  border-radius:12px;
  padding:12px;
  cursor:pointer;
}

/* LOADER */
.loader {
  text-align:center;
  display:none;
  margin-top:20px;
}

/* FLIGHTS */
.flights {
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

.flight-card {
  background:var(--card);
  padding:20px;
  border-radius:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  transition:0.3s;
}

.flight-card:hover {
  transform:translateY(-5px);
}

.flight-info h3 {margin:0;}
.flight-info p {margin:5px 0;color:var(--muted);}

.badge {
  background:#ef444420;
  color:#ef4444;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}

.flight-card button {
  background:var(--accent);
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:var(--card);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.modal button {
  margin-top:20px;
  padding:10px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:10px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  color:var(--muted);
}

@media(max-width:700px){
  .search-box {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <img src="Logo.png">
  <nav>
    <a href="#">Home</a>
    <a href="#flights">Flights</a>
  </nav>
</header>

<section class="hero">
  <h1>Fly the world from Amman</h1>
  <p>In partnership with Jordanian Airlines</p>

  <div class="search-box">
    <input id="from" value="Amman">
    <input id="to" placeholder="Destination">
    <input type="date" id="date">
    <input placeholder="Passengers">
    <button onclick="searchFlights()">Search</button>
  </div>
</section>

<div class="loader" id="loader">Searching global routes...</div>

<section class="flights" id="flights">
  <div id="results"></div>
</section>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Booking Simulation</h2>
    <p>This is a demo airline site.</p>
    <p>No real booking is processed.</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<footer>
  TRIPLE M FOR FLYING — Demo Startup Airline UI
</footer>

<script>
function searchFlights(){
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');

  loader.style.display = 'block';
  results.innerHTML = '';

  setTimeout(()=>{

    loader.style.display = 'none';

    const to = document.getElementById('to').value.toLowerCase();

    const flights = [
      {to:'Dubai',price:220},
      {to:'Istanbul',price:180},
      {to:'Cairo',price:150},
      {to:'Paris',price:420},
      {to:'London',price:480},
      {to:'New York',price:850},
      {to:'Los Angeles',price:950},
      {to:'Tokyo',price:920},
      {to:'Berlin',price:350},
      {to:'Rome',price:300}
    ];

    let filtered = flights.filter(f =>
      to==='' || f.to.toLowerCase().includes(to)
    );

    filtered.forEach(f=>{
      const seats = Math.floor(Math.random()*5)+1;

      const card = document.createElement('div');
      card.className = 'flight-card';

      card.innerHTML = `
        <div class="flight-info">
          <h3>Amman → ${f.to}</h3>
          <p>$${f.price} round trip • Fees included</p>
          <span class="badge">${seats} seats left</span>
        </div>
        <button onclick="openModal()">Select</button>
      `;

      results.appendChild(card);
    });

  },1200);
}

function openModal(){
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
