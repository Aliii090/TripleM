<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPLE M FOR FLYING</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a;
  --card: #111827;
  --primary: #3b82f6;
  --accent: #22c55e;
  --text: #e5e7eb;
  --muted: #9ca3af;
}body.light { --bg: #f9fafb; --card: #ffffff; --text: #111827; --muted: #6b7280; }

{ box-sizing: border-box; }


body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

header { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; }

header img { height: 45px; }

nav { display: flex; align-items: center; gap: 20px; }

nav a { text-decoration: none; color: var(--muted); font-weight: 500; }

.toggle { background: var(--card); padding: 8px 14px; border-radius: 999px; cursor: pointer; }

.hero { padding: 80px 20px 40px; text-align: center; }

.hero h1 { font-size: 3rem; margin-bottom: 10px; }

.hero p { color: var(--muted); }

.search-container { margin-top: 40px; display: flex; justify-content: center; }

.search-box { background: var(--card); padding: 15px; border-radius: 20px; display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 10px; width: 100%; max-width: 900px; }

.search-box input { padding: 12px; border-radius: 12px; border: none; background: rgba(255,255,255,0.05); color: var(--text); }

.search-box button { background: var(--primary); border: none; color: white; border-radius: 12px; padding: 12px 20px; cursor: pointer; }

.loader { text-align: center; margin-top: 20px; display: none; color: var(--muted); }

.flights { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

.flight-card { background: var(--card); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; transition: 0.2s; }

.flight-card:hover { transform: translateY(-3px); }

.flight-info h3 { margin: 0; }

.flight-info p { margin: 5px 0; color: var(--muted); }

.badge { background: rgba(239,68,68,0.15); color: #ef4444; padding: 4px 10px; border-radius: 999px; font-size: 12px; }

.flight-card button { background: var(--accent); border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; }

footer { text-align: center; padding: 30px; color: var(--muted); }

@media (max-width: 700px) { .search-box { grid-template-columns: 1fr; } } </style>

</head>
<body><header>
  <img src="Logo.png">
  <nav>
    <a href="#">Home</a>
    <a href="#flights">Flights</a>
    <div class="toggle" onclick="toggleMode()">Mode</div>
  </nav>
</header><section class="hero">
  <h1>Fly smarter, pay less</h1>
  <p>TRIPLE M FOR FLYING — clean, fast, affordable</p>  <div class="search-container">
    <div class="search-box">
      <input id="from" placeholder="From">
      <input id="to" placeholder="To">
      <input type="date" id="date">
      <input placeholder="Passengers">
      <button onclick="searchFlights()">Search</button>
    </div>
  </div>
</section><div class="loader" id="loader">Searching best deals...</div><section class="flights" id="flights">
  <div id="results"></div>
</section><footer>
  Demo airline UI — flights are not real
</footer><script>
function toggleMode(){
  document.body.classList.toggle('light');
}

function searchFlights(){
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');

  loader.style.display = 'block';
  results.innerHTML = '';

  setTimeout(()=>{
    loader.style.display = 'none';

    const from = document.getElementById('from').value.toLowerCase();
    const to = document.getElementById('to').value.toLowerCase();

    const flights = [
      {from:'Amman',to:'Dubai',price:45},
      {from:'Amman',to:'Istanbul',price:60},
      {from:'Amman',to:'Cairo',price:35},
      {from:'Amman',to:'Paris',price:120},
      {from:'Amman',to:'London',price:150}
    ];

    let filtered = flights.filter(f =>
      (from===''||f.from.toLowerCase().includes(from)) &&
      (to===''||f.to.toLowerCase().includes(to))
    );

    if(filtered.length===0){
      results.innerHTML = '<p>No flights found</p>';
      return;
    }

    filtered.forEach(f=>{
      const seats = Math.floor(Math.random()*5)+1;

      const card = document.createElement('div');
      card.className = 'flight-card';

      card.innerHTML = `
        <div class="flight-info">
          <h3>${f.from} → ${f.to}</h3>
          <p>$${f.price} • $5 fees</p>
          <span class="badge">${seats} seats left</span>
        </div>
        <button onclick="alert('Demo only')">Select</button>
      `;

      results.appendChild(card);
    });

  }, 900);
}
</script></body>
</html>
